version: 2

env:
  - GO111MODULE=on
  - CGO_ENABLED=0
  - GITHUB_ORG=almeidapaulopt
  - DOCKER_ORG=almeidapaulopt
  - DOCKERFILE=Dockerfile.goreleaser
  - LATEST={{ if .Env.LATEST_TAG }}{{ .Env.LATEST_TAG }}{{ else }}{{ .Major }}{{ end }}

before:
  hooks:
    - bun i --cwd ./web
    - bun run --cwd web build
    - sh -c 'go install github.com/a-h/templ/cmd/templ@$(go list -m github.com/a-h/templ | awk "{print \$2}")'
    - go generate ./...

snapshot:
  version_template: "{{ incpatch .Version }}-{{ .Env.LATEST }}"

report_sizes: true

milestones:
  - close: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

release:
  name_template: "{{.ProjectName}}-v{{.Version}}"
  mode: replace
  target_commitish: "{{ .Commit }}"
  discussion_category_name: General
  prerelease: auto
  make_latest: "{{ if not .Prerelease }}true{{ else }}false{{ end }}"

builds:
  - id: server
    main: ./cmd/server/main.go
    binary: tsdproxyd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      - goarch: arm
        goos: windows
      - goarch: arm64
        goos: freebsd
    ldflags:
      - -s -w
      - -X "github.com/almeidapaulopt/tsdproxy/internal/core.version={{ .Version }}"
      - -X "tailscale.com/version.Short={{ .Env.TAILSCALE_VERSION }}"
      - -X "tailscale.com/version.Long={{ .Env.TAILSCALE_VERSION }}-TSDProxy"
      - -X "tailscale.com/version.GitCommit={{ .ShortCommit }}"
      - -X "tailscale.com/version.shortStamp={{ .Env.TAILSCALE_VERSION }}"
      - -X "tailscale.com/version.longStamp={{ .Env.TAILSCALE_VERSION }}-TSDProxy"
      - -X "tailscale.com/version.gitCommitStamp={{ .ShortCommit }}"

  - id: healthcheck
    main: ./cmd/healthcheck/main.go
    binary: healthcheck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      - goarch: arm
        goos: windows
      - goarch: arm64
        goos: freebsd

universal_binaries:
  - replace: false

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive
    args:
      - "$artifact"
      - --output
      - spdx-json
      - "--file=${artifact}.sbom.json"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: '^.*?(feat|fix)\(deps\)!?:.+$'
      order: 300
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: "Security updates"
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 150
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: "Documentation updates"
      regexp: ^.*?docs(\([[:word:]]+\))??!?:.+$
      order: 400
    - title: "Build process updates"
      regexp: ^.*?build(\([[:word:]]+\))??!?:.+$
      order: 400
    - title: Other work
      order: 9999

archives:
  - formats: tar.gz
    files:
      - README.md
      - LICENSE
    allow_different_binary_count: true

dockers_v2:
  - dockerfile: "{{ .Env.DOCKERFILE }}"
    ids:
      - server
      - healthcheck
    images:
      - "{{ .Env.DOCKER_ORG }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GITHUB_ORG }}/{{ .ProjectName }}"
    tags:
      - "{{ .Env.LATEST }}"
      - "{{ .Version }}"
      - "{{ .Major }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v6
      - linux/arm/v7
    labels:
      "io.artifacthub.package.maintainers": '{"name":"Paulo Almeida","email":"almeidapaulopt@gmail.com"}'
      "io.artifacthub.package.license": "MIT"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "{{ .ProjectName }}"
      "org.opencontainers.image.url": "https://github.com/{{ .Env.GITHUB_ORG }}/{{ .ProjectName }}"
      "org.opencontainers.image.source": "{{.GitURL}}"

docker_signs:
  - args:
      - "sign"
      - "${artifact}@${digest}"
      - --yes

homebrew_casks:
  - name: tsdproxy
    binaries:
      - tsdproxyd
    homepage: "https://github.com/almeidapaulopt/tsdproxy"
    description: "Tailscale Docker reverse proxy — expose containers with one label"
    skip_upload: '{{ if .Env.DISABLE_PACKAGE_MANAGERS }}true{{ else }}auto{{ end }}'
    url:
      verified: "github.com/almeidapaulopt/tsdproxy/"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tsdproxyd"]
          end
    repository:
      owner: almeidapaulopt
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

aurs:
  - name: tsdproxy-bin
    homepage: "https://github.com/almeidapaulopt/tsdproxy"
    description: "Tailscale Docker reverse proxy — expose containers with one label"
    maintainers:
      - "Paulo Almeida <almeidapaulopt at gmail dot com>"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/tsdproxy-bin.git"
    skip_upload: auto
    disable: '{{ if .Env.DISABLE_PACKAGE_MANAGERS }}true{{ else }}false{{ end }}'
    provides:
      - tsdproxy
    conflicts:
      - tsdproxy
    package: |-
      install -Dm755 "./tsdproxyd" "${pkgdir}/usr/bin/tsdproxyd"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/tsdproxy-bin/LICENSE"
    commit_author:
      name: almeidapaulopt
      email: almeidapaulopt@gmail.com
