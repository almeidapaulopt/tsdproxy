# .github/workflows/release.yml
name: goreleaser

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: dockerhub-login
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: ghcr-login
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Tailscale version
        run: echo "TAILSCALE_VERSION=$(go list -m tailscale.com | awk '{print $2}')" >> $GITHUB_ENV

      - name: Configure release stream
        run: |
          MAJOR=$(echo "${GITHUB_REF#refs/tags/v}" | cut -d. -f1)
          HIGHEST=$(git tag -l 'v[0-9]*' | sed 's/v//' | cut -d. -f1 | sort -n | tail -1)
          echo "DISABLE_PACKAGE_MANAGERS=false" >> $GITHUB_ENV
          if [ "$MAJOR" -ge "${HIGHEST:-0}" ]; then
            echo "LATEST_TAG=latest" >> $GITHUB_ENV
          else
            echo "DISABLE_PACKAGE_MANAGERS=true" >> $GITHUB_ENV
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAILSCALE_VERSION: ${{ env.TAILSCALE_VERSION }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          LATEST_TAG: ${{ env.LATEST_TAG }}
          DISABLE_PACKAGE_MANAGERS: ${{ env.DISABLE_PACKAGE_MANAGERS }}
