name: dev release

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - dev/**

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: DockerHub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: GHCR login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        run: |
          TS_VER=$(grep '^	tailscale.com ' go.mod | awk '{print $2}')
          echo "tailscale_version=$TS_VER" >> "$GITHUB_OUTPUT"
          echo "git_commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          push: true
          tags: |
            almeidapaulopt/tsdproxy:dev
            ghcr.io/almeidapaulopt/tsdproxy:dev
          build-args: |
            VERSION=dev
            TAILSCALE_VERSION=${{ steps.meta.outputs.tailscale_version }}
            GIT_COMMIT=${{ steps.meta.outputs.git_commit }}

      - name: Sign images with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          digest="${{ steps.push.outputs.digest }}"
          cosign sign --yes "almeidapaulopt/tsdproxy@${digest}"
          cosign sign --yes "ghcr.io/almeidapaulopt/tsdproxy@${digest}"
