# .github/workflows/release.yml
name: goreleaser devel

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - dev/**

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: sigstore/cosign-installer@v4.1.2

      - name: dockerhub-login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: ghcr-login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Tailscale version
        run: echo "TAILSCALE_VERSION=$(go list -m tailscale.com | awk '{print $2}')" >> $GITHUB_ENV

      - name: Set dev tag
        run: echo "LATEST_TAG=dev" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot -f .goreleaser-dev.yaml --skip validate --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TAILSCALE_VERSION: ${{ env.TAILSCALE_VERSION }}

      - name: Push dev images and create manifests
        run: |
          set -euo pipefail
          DOCKER_IMAGE="almeidapaulopt/tsdproxy"
          GHCR_IMAGE="ghcr.io/almeidapaulopt/tsdproxy"
          SUFFIXES=("amd64" "arm64" "armv6" "armv7")

          for image in "${DOCKER_IMAGE}" "${GHCR_IMAGE}"; do
            echo "=== Pushing per-arch images for ${image} ==="
            PER_ARCH=()
            for suffix in "${SUFFIXES[@]}"; do
              img="${image}:dev-${suffix}"
              docker push "${img}"
              PER_ARCH+=("${img}")
            done

            echo "=== Creating multi-arch manifest :dev for ${image} ==="
            docker manifest rm "${image}:dev" 2>/dev/null || true
            docker manifest create "${image}:dev" "${PER_ARCH[@]}"
            docker manifest push "${image}:dev"
          done
