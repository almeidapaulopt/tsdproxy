name: dev release

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - dev/**

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      tailscale_version: ${{ steps.meta.outputs.tailscale_version }}
      git_commit: ${{ steps.meta.outputs.git_commit }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Compute metadata
        id: meta
        run: |
          TS_VER=$(grep '^	tailscale.com ' go.mod | awk '{print $2}')
          echo "tailscale_version=$TS_VER" >> "$GITHUB_OUTPUT"
          echo "git_commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Download Go modules
        run: go mod download

      - name: Save Go module cache
        uses: actions/cache/save@v6
        with:
          path: ~/go/pkg/mod
          key: gomod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: |
          bun i --cwd ./web
          bun run --cwd web build

      - name: Generate templ
        run: |
          TEMPL_VER=$(go list -m github.com/a-h/templ | awk '{print $2}')
          curl -sSL "https://github.com/a-h/templ/releases/download/${TEMPL_VER}/templ_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin templ
          go generate ./...

      - name: Upload prepared assets
        uses: actions/upload-artifact@v7
        with:
          name: prepared
          path: |
            web/dist/
            internal/**/*_templ.go
          if-no-files-found: error

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - { goarch: amd64, platform: amd64,  docker_platform: linux/amd64 }
          - { goarch: arm64, platform: arm64,  docker_platform: linux/arm64 }
          - { goarch: arm, goarm: "6", platform: armv6,  docker_platform: linux/arm/v6 }
          - { goarch: arm, goarm: "7", platform: armv7,  docker_platform: linux/arm/v7 }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Restore Go module cache
        uses: actions/cache/restore@v6
        with:
          path: ~/go/pkg/mod
          key: gomod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          fail-on-cache-miss: false

      - name: Download prepared assets
        uses: actions/download-artifact@v8
        with:
          name: prepared

      - name: Build binaries
        env:
          TS_VER: ${{ needs.prepare.outputs.tailscale_version }}
          COMMIT: ${{ needs.prepare.outputs.git_commit }}
        run: |
          set -euo pipefail
          out="docker-binaries/${{ matrix.docker_platform }}"
          mkdir -p "$out"

          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -ldflags "-s -w \
              -X github.com/almeidapaulopt/tsdproxy/internal/core.version=dev \
              -X tailscale.com/version.Short=${TS_VER} \
              -X tailscale.com/version.Long=${TS_VER}-TSDProxy \
              -X tailscale.com/version.GitCommit=${COMMIT} \
              -X tailscale.com/version.shortStamp=${TS_VER} \
              -X tailscale.com/version.longStamp=${TS_VER}-TSDProxy \
              -X tailscale.com/version.gitCommitStamp=${COMMIT}" \
            -o "$out/tsdproxyd" ./cmd/server/



      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: docker-binaries-${{ matrix.platform }}
          path: docker-binaries/
          if-no-files-found: error

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: DockerHub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: GHCR login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: docker-binaries-*
          merge-multiple: true
          path: docker-binaries

      - name: Restore executable permissions
        run: |
          find docker-binaries -name tsdproxyd -exec chmod +x {} +

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./docker-binaries
          file: ./Dockerfile.ci
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          push: true
          tags: |
            almeidapaulopt/tsdproxy:dev
            ghcr.io/almeidapaulopt/tsdproxy:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign images with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          digest="${{ steps.push.outputs.digest }}"
          cosign sign --yes "almeidapaulopt/tsdproxy@${digest}"
          cosign sign --yes "ghcr.io/almeidapaulopt/tsdproxy@${digest}"
