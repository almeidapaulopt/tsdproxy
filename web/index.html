<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSDProxy</title>

  <link rel="stylesheet" href="styles.css" type="text/css">
  <script src="scripts.js" defer type="module"></script>
</head>

<body>

  <!-- ═══════════════ NAVBAR ═══════════════ -->
  <nav class="navbar sticky top-0 z-40 px-4 md:px-6 h-14 min-h-14 bg-base-100/95 backdrop-blur-xs border-b border-base-content/10">
    <!-- Logo -->
    <div class="navbar-start">
      <a href="/" class="flex items-center gap-2 px-1 py-1.5 rounded-lg hover:bg-base-content/5 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="25 25 100 100" fill="none" class="h-7 w-7 shrink-0">
          <circle cx="75" cy="75" r="50" fill="var(--color-primary)" />
          <circle cx="75" cy="55" r="5" fill="#FFFFFF" />
          <circle cx="95" cy="75" r="5" fill="#FFFFFF" />
          <circle cx="75" cy="95" r="5" fill="#FFFFFF" />
          <circle cx="55" cy="75" r="5" fill="#FFFFFF" />
          <line x1="75" y1="55" x2="95" y2="75" stroke="#FFFFFF" stroke-width="2" />
          <line x1="95" y1="75" x2="75" y2="95" stroke="#FFFFFF" stroke-width="2" />
          <line x1="75" y1="95" x2="55" y2="75" stroke="#FFFFFF" stroke-width="2" />
          <line x1="55" y1="75" x2="75" y2="55" stroke="#FFFFFF" stroke-width="2" />
        </svg>
        <span class="font-bold text-base tracking-tight text-base-content">TSDProxy</span>
      </a>
    </div>

    <!-- Controls -->
    <div class="navbar-end gap-1 sm:gap-2">

      <!-- Search -->
      <label class="input input-sm flex items-center gap-2 flex-1 sm:flex-none sm:min-w-52 max-w-xs">
        <svg class="h-4 w-4 opacity-40 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </g>
        </svg>
        <input id="searchInput" oninput="setState('search', this.value)" placeholder="Search..." type="search" class="grow min-w-0 text-sm" tabindex="0" />
        <kbd class="kbd kbd-xs hidden md:inline opacity-40">ctrl</kbd>
        <kbd class="kbd kbd-xs hidden md:inline opacity-40">f</kbd>
      </label>

      <!-- Docs link (desktop) -->
      <a class="btn btn-ghost btn-sm hidden sm:inline-flex text-sm font-medium"
        href="https://almeidapaulopt.github.io/tsdproxy/docs/">Docs</a>

      <!-- Sponsor button (desktop) -->
      <a class="btn btn-sm btn-soft btn-secondary hidden sm:inline-flex"
        href="https://buymeacoffee.com/almeidapaulopt"
        target="_blank" rel="noopener noreferrer">
        ☕ Sponsor
      </a>

      <!-- View toggle (desktop) -->
      <div class="join hidden sm:inline-flex">
        <button class="btn btn-xs join-item"
          onclick="setState('view', 'card')" aria-label="card view" title="Card view">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/>
            <rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/>
          </svg>
        </button>
        <button class="btn btn-xs join-item"
          onclick="setState('view', 'compact')" aria-label="compact view" title="Compact view">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/>
            <line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Notifications (desktop) -->
      <button class="btn btn-ghost btn-sm btn-square hidden sm:inline-flex" onclick="requestNotifications()"
        aria-label="enable notifications" title="Enable notifications">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
      </button>

      <!-- Theme toggle (desktop) -->
      <label class="cursor-pointer gap-1.5 hidden sm:inline-flex items-center" title="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-60">
          <circle cx="12" cy="12" r="5" />
          <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
        </svg>
              <input type="checkbox" class="toggle toggle-sm theme-controller" onclick="setState('dark', !state.dark)" aria-label="theme switch" />
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-60">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </label>

      <!-- User avatar dropdown (conditional) -->
      <details class="dropdown dropdown-end" id="user-menu">
        <summary class="btn btn-ghost btn-sm btn-circle avatar border border-base-content/15" aria-label="user menu">
          <div class="w-7 h-7 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5 fill-base-content/60" id="user-icon-default">
              <path stroke-width="0"
                d="M20.5,14.5V16H19V14.5H20.5M18.5,9.5H17V9A3,3 0 0,1 20,6A3,3 0 0,1 23,9C23,9.97 22.5,10.88 21.71,11.41L21.41,11.6C20.84,12 20.5,12.61 20.5,13.3V13.5H19V13.3C19,12.11 19.6,11 20.59,10.35L20.88,10.16C21.27,9.9 21.5,9.47 21.5,9A1.5,1.5 0 0,0 20,7.5A1.5,1.5 0 0,0 18.5,9V9.5M9,13C11.67,13 17,14.34 17,17V20H1V17C1,14.34 6.33,13 9,13M9,4A4,4 0 0,1 13,8A4,4 0 0,1 9,12A4,4 0 0,1 5,8A4,4 0 0,1 9,4M9,14.9C6.03,14.9 2.9,16.36 2.9,17V18.1H15.1V17C15.1,16.36 11.97,14.9 9,14.9M9,5.9A2.1,2.1 0 0,0 6.9,8A2.1,2.1 0 0,0 9,10.1A2.1,2.1 0 0,0 11.1,8A2.1,2.1 0 0,0 9,5.9Z" />
            </svg>
            <img class="rounded-full w-full h-full object-cover" id="user-avatar" alt="user avatar" />
          </div>
        </summary>
        <div class="dropdown-content bg-base-100 border border-base-content/10 rounded-xl z-50 mt-2 w-52 p-3 shadow-md">
          <p class="text-sm font-semibold truncate" id="user-displayname"></p>
          <p class="text-xs text-base-content/50 truncate" id="user-username"></p>
        </div>
      </details>

      <!-- Mobile hamburger menu -->
      <details class="dropdown dropdown-end sm:hidden">
        <summary class="btn btn-ghost btn-sm btn-square" aria-label="menu">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
          </svg>
        </summary>
        <ul class="dropdown-content menu bg-base-100 border border-base-content/10 rounded-xl z-50 mt-2 w-56 p-2 shadow-md gap-0.5">
          <li>
            <div class="join w-full">
              <button class="btn btn-xs join-item flex-1"
                onclick="setState('view', 'card')" aria-label="card view">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/>
                  <rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/>
                </svg>
                Cards
              </button>
              <button class="btn btn-xs join-item flex-1"
                onclick="setState('view', 'compact')" aria-label="compact view">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/>
                  <line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/>
                </svg>
                List
              </button>
            </div>
          </li>
          <li>
            <button class="flex items-center gap-2 text-sm" onclick="requestNotifications()" aria-label="enable notifications">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
                <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
              </svg>
              Notifications
            </button>
          </li>
          <li><a href="https://almeidapaulopt.github.io/tsdproxy/docs/" class="text-sm">Documentation</a></li>
          <li>
            <a class="text-sm text-secondary" href="https://buymeacoffee.com/almeidapaulopt"
              target="_blank" rel="noopener noreferrer">☕ Become a Sponsor</a>
          </li>
          <div class="divider my-1"></div>
          <li>
            <label class="flex cursor-pointer items-center gap-2 px-2 py-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-60">
                <circle cx="12" cy="12" r="5" />
                <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
              </svg>
              <span class="text-sm flex-1">Dark mode</span>
        <input type="checkbox" class="toggle toggle-sm theme-controller" onclick="setState('dark', !state.dark)" aria-label="theme switch" />
            </label>
          </li>
        </ul>
      </details>

    </div>
  </nav>

  <!-- ═══════════════ TOOLBAR ═══════════════ -->
  <div class="toolbar">
    <button class="btn btn-xs" onclick="setState('grouped', !state.grouped)" aria-label="group toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 13V2l8 4-8 4"/><path d="M20.55 10.23A9 9 0 1 1 8 4.94"/>
      </svg>
      <span class="hidden sm:inline">Group</span>
    </button>

    <div class="flex items-center gap-1.5">
      <label class="text-xs text-base-content/50 shrink-0">Sort</label>
      <select class="select select-xs" onchange="setState('sort', this.value)">
        <option value="name">Name</option>
        <option value="status">Status</option>
        <option value="provider">Provider</option>
        <option value="health">Health</option>
      </select>
    </div>

    <div class="flex items-center gap-1 min-w-0">
      <label class="text-xs text-base-content/50 sm:mr-1 shrink-0">Status</label>
      <div class="filter filter-scroll">
        <input class="btn btn-xs filter-reset" type="radio" name="filterStatus" aria-label="All"      onchange="setState('filterStatus', 'all')" checked>
        <input class="btn btn-xs"              type="radio" name="filterStatus" aria-label="Running"  onchange="setState('filterStatus', 'Running')">
        <input class="btn btn-xs"              type="radio" name="filterStatus" aria-label="Stopped"  onchange="setState('filterStatus', 'Stopped')">
        <input class="btn btn-xs"              type="radio" name="filterStatus" aria-label="Error"    onchange="setState('filterStatus', 'Error')">
      </div>
    </div>

    <div class="flex items-center gap-1 min-w-0">
      <label class="text-xs text-base-content/50 sm:mr-1 shrink-0">Health</label>
      <div class="filter filter-scroll">
        <input class="btn btn-xs filter-reset" type="radio" name="filterHealth" aria-label="All"       onchange="setState('filterHealth', 'all')" checked>
        <input class="btn btn-xs"              type="radio" name="filterHealth" aria-label="Healthy"   onchange="setState('filterHealth', 'healthy')">
        <input class="btn btn-xs"              type="radio" name="filterHealth" aria-label="Unhealthy" onchange="setState('filterHealth', 'down')">
      </div>
    </div>


  </div>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <main>
    <div id="proxy-list">
    </div>
  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="footer sm:footer-horizontal bg-base-200/60 border-t border-base-content/8 px-6 py-5 mt-10">
    <aside class="flex items-center gap-3">
      <img src="/icons/tsdproxy.svg" alt="TSDProxy Logo" class="h-7 w-7 opacity-80" />
      <p class="text-sm text-base-content/60">
        TSDProxy <span id="app-version" class="text-base-content/40"></span> by <strong class="text-base-content/80">Paulo Almeida</strong>
        &amp; <a href="https://github.com/almeidapaulopt/tsdproxy/graphs/contributors"
          target="_blank" rel="noopener noreferrer"
          class="link link-hover text-base-content/60">contributors</a>
      </p>
    </aside>
    <nav class="flex items-center gap-5 sm:place-self-center sm:justify-self-end">
      <a href="https://github.com/almeidapaulopt/tsdproxy" target="_blank"
        rel="noopener noreferrer" class="opacity-50 hover:opacity-100 transition-opacity" aria-label="GitHub">
        <img class="h-5" src="/icons/sh/github.svg" alt="github" />
      </a>
      <a href="https://x.com/almeidapaulopt" target="_blank"
        rel="noopener noreferrer" class="opacity-50 hover:opacity-100 transition-opacity" aria-label="X / Twitter">
        <img class="h-5" src="/icons/sh/x.svg" alt="X" />
      </a>
    </nav>
  </footer>

<script type="module">
import { connectSSE } from "./sse-client.js";
import { state, setState, onStateChange } from "./state.js";

// Expose for inline event handlers
window.state = state;
window.setState = setState;

document.body.dataset.theme = state.dark ? 'tsdproxy-dark' : 'tsdproxy-light';
document.querySelectorAll('.theme-controller').forEach(el => el.checked = state.dark);

const proxyList = document.getElementById('proxy-list');
if (proxyList) proxyList.classList.toggle('compact', state.view === 'compact');

const sortSelect = document.querySelector('select[onchange*="sort"]');
if (sortSelect) sortSelect.value = state.sort;

function syncViewButtons() {
  document.querySelectorAll('[onclick*="setState(\'view\'"]').forEach(btn => {
    const onclick = btn.getAttribute('onclick');
    btn.classList.toggle('btn-primary', onclick.includes(`'${state.view}'`));
  });
}
syncViewButtons();

const groupBtn = document.querySelector('[onclick*="grouped"]');
if (groupBtn) groupBtn.classList.toggle('btn-primary', state.grouped);

// Open main SSE connection
connectSSE('/stream');

// Register state change listeners
onStateChange('dark', (val) => {
  document.body.dataset.theme = val ? 'tsdproxy-dark' : 'tsdproxy-light';
  document.querySelectorAll('.theme-controller').forEach(el => el.checked = val);
});

onStateChange('view', () => {
  const list = document.getElementById('proxy-list');
  if (list) list.classList.toggle('compact', state.view === 'compact');
  if (typeof window.sortList === 'function') window.sortList();
  syncViewButtons();
});

onStateChange('sort', () => {
  if (typeof window.sortList === 'function') window.sortList();
  if (sortSelect) sortSelect.value = state.sort;
});

onStateChange('grouped', () => {
  if (typeof window.groupList === 'function') window.groupList(state.grouped, state.sort);
  if (groupBtn) groupBtn.classList.toggle('btn-primary', state.grouped);
});

onStateChange('filterStatus', () => {
  if (typeof window.filterCards === 'function') window.filterCards();
});

onStateChange('filterHealth', () => {
  if (typeof window.filterCards === 'function') window.filterCards();
});

onStateChange('search', () => {
  if (typeof window.filterCards === 'function') window.filterCards();
});

onStateChange('user_profilePicUrl', (url) => {
  const img = document.getElementById('user-avatar');
  const svg = document.getElementById('user-icon-default');
  if (url) {
    if (img) img.src = url;
    if (img) img.classList.remove('hidden');
    if (svg) svg.classList.add('hidden');
  } else {
    if (img) img.classList.add('hidden');
    if (svg) svg.classList.remove('hidden');
  }
});

onStateChange('user_displayName', (name) => {
  const el = document.getElementById('user-displayname');
  if (el) el.textContent = name;
});

onStateChange('user_username', (name) => {
  const el = document.getElementById('user-username');
  const menu = document.getElementById('user-menu');
  if (el) el.textContent = name;
  if (menu) {
    if (name) {
      menu.classList.remove('hidden');
    } else {
      menu.classList.add('hidden');
    }
  }
});

// Global keyboard handler
window.addEventListener('keydown', (evt) => {
  if (typeof window.handleKeyboard === 'function') window.handleKeyboard(evt);
});

// Fetch and display version
fetch('/api/version')
  .then(r => r.ok ? r.json() : null)
  .then(data => {
    if (data && data.version) {
      const el = document.getElementById('app-version');
      if (el) el.textContent = 'v' + data.version;
    }
  })
  .catch(() => {});
</script>

</body>

</html>
