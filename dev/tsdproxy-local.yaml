defaultProxyProvider: default
docker:
  local:
    host: unix:///var/run/docker.sock
    targetHostname: 172.17.0.1
  # server:
  #   host: tcp://192.168.1.110:2375
  #   TargetHostname: 192.168.1.110

lists:
  file1:
    filename: dev/file1.yaml

tailscale:
  providers:
    default:
      controlUrl: https://controlplane.tailscale.com
      tags: tag:example
      # authKeyFile: dev/KEY_FILE
    services:
      services: true
      hostname: tsdproxy-svc
      tags: tag:example
      controlUrl: https://controlplane.tailscale.com
      autoApproveDevices: true
      # OAuth credentials provided via env vars (avoids hardcoding in YAML):
      #   TSDPROXY_TAILSCALE_SERVICES_CLIENTID
      #   TSDPROXY_TAILSCALE_SERVICES_CLIENTSECRET
  dataDir: dev/data/
http:
  hostname: 0.0.0.0
  port: 8080
adminAllowLocalhost: true
log:
  level: debug
  json: false
proxyAccessLog: true
