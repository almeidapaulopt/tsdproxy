services:
  c1:
    image: nginx:latest
    ports:
      - 91:80
      - 92:8000
      - 93:8080
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=nginx-main
      - tsdproxy.dash.label=NGINX Main
      - tsdproxy.dash.icon=sh/nginx
      - tsdproxy.ephemeral=true
      - tsdproxy.funnel=true
      - tsdproxy.container_port=80
      - tsdproxy.dash.visible=true
      - tsdproxy.dash.category=infra
    # networks:
    # - c1

  c2:
    image: nginx:1.27
    ports:
      - 82:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=nginx-old
      - tsdproxy.dash.label=NGINX Legacy
      - tsdproxy.dash.icon=sh/nginx
      - tsdproxy.dash.category=infra
    networks:
      - c2

  c3:
    image: nginxinc/nginx-unprivileged:latest
    ports:
      - 83:8080
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=nginx-unpriv
      - tsdproxy.dash.label=NGINX Unprivileged
      - tsdproxy.dash.icon=sh/nginx
      - tsdproxy.autodetect=true
      - tsdproxy.dash.category=media
    # networks:
    #   - c2

  # Unhealthy container: runs but has no HTTP server on port 8080
  broken:
    image: busybox
    command: sleep infinity
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=broken-service
      - tsdproxy.dash.label=Broken Service
      - tsdproxy.dash.icon=mdi/alert-circle
      - tsdproxy.container_port=8080
      - tsdproxy.dash.category=infra

  standalone:
    image: nginx:alpine
    ports:
      - 84:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=standalone-app
      - tsdproxy.dash.label=Standalone App
      - tsdproxy.dash.icon=mdi/application

  udprange:
    image: nginx:alpine
    ports:
      - 85:80
      - 56000-56002:56000-56002/udp
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=udprange
      - tsdproxy.dash.label=UDP Range Test
      - tsdproxy.port.1=443/https:80/http
      - tsdproxy.port.2=56000-56002/udp:56000-56002/udp

volumes:
  tsdata:
  tmp:

networks:
  c1:
  c2:
