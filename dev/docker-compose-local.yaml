services:
  c1:
    image: nginx:latest
    ports:
      - 91:80
      - 92:8000
      - 93:8080
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=nginx-main
      - tsdproxy.dash.label=NGINX Main
      - tsdproxy.dash.icon=sh/nginx
      - tsdproxy.ephemeral=true
      - tsdproxy.funnel=true
      - tsdproxy.container_port=80
      - tsdproxy.dash.visible=true
      - tsdproxy.dash.category=infra
    # networks:
    # - c1

  c2:
    image: nginx:1.27
    ports:
      - 82:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=nginx-old
      - tsdproxy.dash.label=NGINX Legacy
      - tsdproxy.dash.icon=sh/nginx
      - tsdproxy.dash.category=infra
    networks:
      - c2

  c3:
    image: nginxinc/nginx-unprivileged:latest
    ports:
      - 83:8080
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=nginx-unpriv
      - tsdproxy.dash.label=NGINX Unprivileged
      - tsdproxy.dash.icon=sh/nginx
      - tsdproxy.autodetect=true
      - tsdproxy.dash.category=media
    # networks:
    #   - c2

  # Unhealthy container: runs but has no HTTP server on port 8080
  broken:
    image: busybox
    command: sleep infinity
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=broken-service
      - tsdproxy.dash.label=Broken Service
      - tsdproxy.dash.icon=mdi/alert-circle
      - tsdproxy.container_port=8080
      - tsdproxy.dash.category=infra

  standalone:
    image: nginx:alpine
    ports:
      - 84:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=standalone-app
      - tsdproxy.dash.label=Standalone App
      - tsdproxy.dash.icon=mdi/application

  # --- Auto-detected icon demo (no explicit dash.icon) ---
  autoicon:
    image: nginx:alpine
    ports:
      - 89:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=auto-icon-demo
      - tsdproxy.dash.label=Auto-Detected Icon
      - tsdproxy.container_port=80

  # --- Auto-restart / re-resolution demo ---
  # Starts healthy (nginx on port 80). To trigger health-triggered re-resolution:
  #   docker compose -f dev/docker-compose-local.yaml exec autorestart-demo nginx -s stop
  # Wait ~90s (3 × 30s health checks). TSDProxy logs will show:
  #   health check: triggering re-resolution
  #   health re-resolution: target changed, hot-swapping  (if IP changed)
  # To make it healthy again:
  #   docker compose -f dev/docker-compose-local.yaml exec autorestart-demo nginx
  autorestart-demo:
    image: nginx:alpine
    ports:
      - 86:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=autorestart-demo
      - tsdproxy.dash.label=AutoRestart Demo
      - tsdproxy.dash.icon=mdi/refresh-auto
      - tsdproxy.container_port=80

  udprange:
    image: nginx:alpine
    ports:
      - 85:80
      - 56000-56002:56000-56002/udp
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=udprange
      - tsdproxy.dash.label=UDP Range Test
      - tsdproxy.port.1=443/https:80/http
      - tsdproxy.port.2=56000-56002/udp:56000-56002/udp

  # --- Simple Icons (si/) demo ---
  simple-icons:
    image: nginx:alpine
    ports:
      - 88:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=simple-icons-demo
      - tsdproxy.dash.label=Simple Icons Demo
      - tsdproxy.dash.icon=si/nginx
      - tsdproxy.container_port=80

  # --- Custom user-added icon demo (no set prefix) ---
  # Drop any .svg, .png, or .webp directly into <icons_dir>/ and reference it as my-icon.png
  custom-icon:
    image: nginx:alpine
    ports:
      - 90:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=custom-icon-demo
      - tsdproxy.dash.label=Custom Icon Demo
      - tsdproxy.dash.icon=my-icon.png
      - tsdproxy.container_port=80

  # --- Tailscale VIP Services demo ---
  # Uses the 'services' proxy provider in services mode.
  # Requires TSDPROXY_TAILSCALE_SERVICES_CLIENTID and
  # TSDPROXY_TAILSCALE_SERVICES_CLIENTSECRET env vars to be set.
  svc:
    image: nginx:alpine
    ports:
      - 87:80
    labels:
      - tsdproxy.enable=true
      - tsdproxy.name=svc-demo
      - tsdproxy.dash.label=VIP Services Demo
      - tsdproxy.dash.icon=mdi/cloud
      - tsdproxy.proxyprovider=services
      - tsdproxy.container_port=80

  prometheus:
    image: prom/prometheus:latest
    container_name: tsdproxy-prometheus
    network_mode: "host"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tsdproxy-grafana
    network_mode: "host"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/dashboard.json
      - GF_SERVER_HTTP_PORT=3000
    restart: unless-stopped

volumes:
  tsdata:
  tmp:
  prometheus-data:
  grafana-data:

networks:
  c1:
  c2:
