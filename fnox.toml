default_provider = "keychain"

[providers.keychain]
type = "keychain"
service = "tsdproxy"
prefix = "tsdproxy"

[secrets]
TSDPROXY_E2E_AUTHKEY = { provider = "keychain", value = "TS_AUTHKEY" }
TSDPROXY_E2E_CLIENTID = { provider = "keychain", value = "TSDPROXY_TAILSCALE_SERVICES_CLIENTID" }
TSDPROXY_E2E_CLIENTSECRET = { provider = "keychain", value = "TSDPROXY_TAILSCALE_SERVICES_CLIENTID" }

CF_API_TOKEN = { provider = "keychain", value = "CF_API_TOKEN" }
CF_DOMAIN = { provider = "keychain", value = "CF_DOMAIN" }

# TSDProxy config env vars (mapped from env-style names above)
TSDPROXY_TAILSCALE_SERVICES_CLIENTID = { provider = "keychain", value = "TSDPROXY_TAILSCALE_SERVICES_CLIENTID" }
TSDPROXY_TAILSCALE_SERVICES_CLIENTSECRET = { provider = "keychain", value = "TSDPROXY_TAILSCALE_SERVICES_CLIENTSECRET" }


TSDPROXY_TAILSCALE_DEFAULT_CLIENTID = { provider = "keychain", value = "TSDPROXY_TAILSCALE_SERVICES_CLIENTID" }
TSDPROXY_TAILSCALE_DEFAULT_CLIENTSECRET = { provider = "keychain", value = "TSDPROXY_TAILSCALE_SERVICES_CLIENTSECRET" }
